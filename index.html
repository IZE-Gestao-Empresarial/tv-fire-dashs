<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>IZE TV</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .iframe-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0;
      pointer-events: none;
      transition: opacity 3s ease-in-out;
      overflow: hidden;
      background: #000;
    }

    .iframe-wrapper.active {
      opacity: 1;
      pointer-events: auto;
    }

    .iframe-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      border: none;
      width: 960px;
      height: 540px;
      transform-origin: top left;
      background: #000;
    }
  </style>
</head>

<body>
  <div class="iframe-wrapper active" id="w0">
    <iframe
      id="f0"
      data-src="https://izedashboardomissao.streamlit.app/~/+/?embed=true">
    </iframe>
  </div>

  <div class="iframe-wrapper" id="w1">
    <iframe
      id="f1"
      data-src="https://dashboardcomercialize.streamlit.app/~/+/?embed=true">
    </iframe>
  </div>

  <div class="iframe-wrapper" id="w2">
    <iframe
      id="f2"
      data-src="https://izedashboardcronograma.streamlit.app/~/+/?embed=true">
    </iframe>
  </div>

  <script>
    var DASH_W = 960;
    var DASH_H = 540;

    var cur = 0;
    var total = 3;

    var DURACAO_MS = 90000;      // 90 segundos por dashboard
    var FADE_MS = 3000;          // igual ao transition do CSS
    var PRELOAD_MS = 20000;      // começa a carregar o próximo 20s antes

    function ajustarScale() {
      var vw = window.innerWidth;
      var vh = window.innerHeight;

      var scale = Math.max(vw / DASH_W, vh / DASH_H);

      var scaledW = DASH_W * scale;
      var scaledH = DASH_H * scale;

      var offsetX = (vw - scaledW) / 2;
      var offsetY = (vh - scaledH) / 2;

      document.querySelectorAll('.iframe-wrapper iframe').forEach(function(f) {
        f.style.transform =
          'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
      });
    }

    function urlComCacheBuster(url) {
      var separador = url.indexOf('?') >= 0 ? '&' : '?';
      return url + separador + '_t=' + Date.now();
    }

    function carregarIframe(index, forcarReload) {
      var iframe = document.getElementById('f' + index);
      var baseUrl = iframe.getAttribute('data-src');

      if (!iframe) return;

      if (forcarReload || !iframe.getAttribute('src')) {
        iframe.setAttribute('src', urlComCacheBuster(baseUrl));
      }
    }

    function mostrarDashboard(index) {
      var anterior = cur;
      cur = index;

      carregarIframe(cur, false);

      document.getElementById('w' + cur).classList.add('active');

      setTimeout(function() {
        document.getElementById('w' + anterior).classList.remove('active');
      }, FADE_MS);
    }

    function agendarProximaTroca() {
      var proximo = (cur + 1) % total;

      setTimeout(function() {
        carregarIframe(proximo, true);
      }, Math.max(DURACAO_MS - PRELOAD_MS, 0));

      setTimeout(function() {
        mostrarDashboard(proximo);
        agendarProximaTroca();
      }, DURACAO_MS);
    }

    ajustarScale();
    window.addEventListener('resize', ajustarScale);

    // Carrega somente o primeiro dashboard no início
    carregarIframe(0, true);

    // Pré-carrega o segundo alguns segundos depois
    setTimeout(function() {
      carregarIframe(1, true);
    }, 5000);

    agendarProximaTroca();
  </script>
</body>
</html>
