<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IZE TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    iframe { width: 100%; height: 100%; border: none; display: none; }
    iframe.active { display: block; }
  </style>
</head>
<body>

<iframe id="f0" src="https://izedashboardomissao.streamlit.app/?embed=true&embed_options=hide_toolbar,hide_footer,hide_padding"></iframe>
<iframe id="f1" src="https://dashboardcomercialize.streamlit.app/?embed=true&embed_options=hide_toolbar,hide_footer,hide_padding"></iframe>
<iframe id="f2" src="https://izedashboardcronograma.streamlit.app/?embed=true&embed_options=hide_toolbar,hide_footer,hide_padding"></iframe>

<script>
var cur = 0;
var total = 3;
var seg = 40;

function trocar() {
  document.getElementById("f" + cur).classList.remove("active");
  cur = (cur + 1) % total;
  document.getElementById("f" + cur).classList.add("active");
  setTimeout(trocar, seg * 1000);
}

document.getElementById("f0").classList.add("active");
setTimeout(trocar, seg * 1000);
</script>

</body>
</html>
