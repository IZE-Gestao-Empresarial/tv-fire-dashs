<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>IZE TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    .iframe-wrapper {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      display: none;
      overflow: hidden;
    }
    .iframe-wrapper.active { display: block; }

    .iframe-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      /* Renderiza como 1280x720 e escala pra caber na tela */
      width: 1344px;
      height: 756px;
      border: none;
      transform-origin: top left;
      transform: scale(var(--scale, 1));
    }

    #footer-cover {
      position: fixed;
      bottom: 0; left: 0;
      width: 100vw;
      height: 50px;
      background: #000;
      z-index: 9999;
    }
  </style>
</head>
<body>

<div class="iframe-wrapper active" id="w0">
  <iframe src="https://izedashboardomissao.streamlit.app/~/+/?embed=true"></iframe>
</div>
<div class="iframe-wrapper" id="w1">
  <iframe src="https://dashboardcomercialize.streamlit.app/~/+/?embed=true"></iframe>
</div>
<div class="iframe-wrapper" id="w2">
  <iframe src="https://izedashboardcronograma.streamlit.app/~/+/?embed=true"></iframe>
</div>

<div id="footer-cover"></div>

<script>
  // Calcula o scale para que 1280x720 caiba exatamente na tela
  function ajustarScale() {
    var scaleX = window.innerWidth / 1344;
    var scaleY = window.innerHeight / 756;
    var scale = Math.min(scaleX, scaleY);
    document.querySelectorAll('.iframe-wrapper iframe').forEach(function(f) {
      f.style.transform = 'scale(' + scale + ')';
    });
  }
  ajustarScale();
  window.addEventListener('resize', ajustarScale);

  var cur = 0;
  var total = 3;
  var seg = 40;

  function trocar() {
    document.getElementById("w" + cur).classList.remove("active");
    cur = (cur + 1) % total;
    document.getElementById("w" + cur).classList.add("active");
    setTimeout(trocar, seg * 1000);
  }
  setTimeout(trocar, seg * 1000);
</script>

</body>
</html>
</script>

</body>
</html>
